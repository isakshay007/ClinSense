version: "3.8"

services:
  clinsense-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CLINSENSE_MODEL_PATH=/app/models/bert_finetuned
      - CLINSENSE_PRELOAD=true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
